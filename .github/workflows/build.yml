name: Build
on:
  workflow_call: {}
  workflow_dispatch: {}
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32s3, esp32p4]
        idf_version: [release-v5.4, release-v5.5]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Build All
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          command: |
            pip install idf-build-apps
            idf-build-apps build --recursive --target ${{ matrix.target }}
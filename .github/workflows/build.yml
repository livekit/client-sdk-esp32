name: Build
on:
  workflow_call: {}
  workflow_dispatch: {}
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32s3, esp32p4]
        # release-v5.5 is a moving branch; post-v5.5.4 IDF renamed
        # DMA2D_DATA_BURST_LENGTH_128 -> PPA_DATA_BURST_LENGTH_128, breaking
        # the gmf_video version transitively pinned via esp_capture ~0.7.
        # Pin to v5.5.3 (pre-rename) until the upstream component catches up.
        idf_version: [release-v5.4, v5.5.3]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { submodules: recursive }
      - name: Build All
        uses: espressif/esp-idf-ci-action@9d38657f3d789ca759b2b37aaf5ceffbc42c4f0d # v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          command: |
            pip install idf-build-apps
            idf-build-apps build --recursive --target ${{ matrix.target }}

name: ESP Registry
on:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        description: Do not actually upload the components
        default: true
    secrets:
      ESP_REGISTRY_TOKEN:
        required: true
jobs:
  esp_registry:
    name: Upload Components
    runs-on: ubuntu-latest
    env:
      COMPONENTS: |
        livekit:./components/livekit
        sandbox_token:./components/sandbox_token
        example_utils:./components/example_utils
        nanopb:./components/third_party/nanopb
        khash:./components/third_party/khash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { submodules: recursive }
      - name: Upload Components (Dry Run)
        uses: espressif/upload-components-ci-action@2ce17d73e35473317c1419dbd4f007aacb593040 # v2.2.1
        if: ${{ inputs.dry_run }}
        with:
          components: ${{ env.COMPONENTS }}
          namespace: livekit
          dry_run: true
      - name: Upload Components
        uses: espressif/upload-components-ci-action@2ce17d73e35473317c1419dbd4f007aacb593040 # v2.2.1
        if: ${{ !inputs.dry_run }}
        with:
          components: ${{ env.COMPONENTS }}
          namespace: livekit
          api_token: ${{ secrets.ESP_REGISTRY_TOKEN }}
      - name: Save Archives
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archives
          path: components/**/*.tgz
          if-no-files-found: error
